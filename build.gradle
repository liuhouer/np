/*
 * This build file was generated by the Gradle 'init' task.
 * This generated file contains a sample Java Library project to get you started.
 * For more details take a look at the Java Libraries chapter in the Gradle
 * user guide available at https://docs.gradle.org/4.1/userguide/java_library_plugin.html
 */
buildscript {
    ext{ 
    	springBootVersion = '1.5.6.RELEASE'
    }
    repositories {
        maven {	
            url = 'http://localhost:10086/repository/maven-public/'
            url = 'http://maven.aliyun.com/nexus/content/groups/public/'
        }
    }
	dependencies {
	    classpath "org.springframework.boot:spring-boot-gradle-plugin:$springBootVersion"
	}
}

// Apply the java-library plugin to add support for Java Library
apply plugin: 'java'
apply plugin:'org.springframework.boot'
apply plugin:'application'
apply plugin: 'war'
ext{ 
	springBootVersion = '1.5.6.RELEASE'
	springVersion = '4.3.10.RELEASE'
	mybatisSpringBootStarterVersion='1.3.1'
	commonsFileuploadVersion='1.3.3'
	commonsLangVersion = '2.6'
	commonsLang3Version = '3.6'
	httpclientVersion = '4.5.3'
	pageHelperVersion = '1.2.3'
	aopallianceVersion = '1.0'
	disruptorVersion='3.3.6'
	druidVersion = '1.1.4'
	aspectjweaverVersion = '1.8.10'
	fastJsonVersion='1.2.35'
}
processResources{ 
	from('src/main/java') { 
		include '**/*.xml'
	}
}

// In this section you declare where to find the dependencies of your project
repositories {
    // Use jcenter for resolving your dependencies.
    // You can declare any Maven/Ivy/file repository here.
    maven {
        url = 'http://maven.aliyun.com/nexus/content/groups/public/'

    }

}

//排除传递性依赖 解决传递依赖的冲突

configurations {
    compile.exclude group:'com.fasterxml.jackson.core'
	compile.exclude group : 'org.hibernate'
	compile.exclude group : 'ch.qos.logback'
	compile.exclude module:'spring-boot-starter-logging'
	compile.exclude module:'log4j-over-slf4j'
	compile.exclude module:'jul-to-slf4j'
	compile.exclude module:'commons-logging'
	compile.exclude module:'org.apache.common'
	
}


dependencies {
    // Use JUnit test framework
    testImplementation 'junit:junit:4.12'
    compile "org.springframework.boot:spring-boot-starter-log4j2:$springBootVersion"
    compile "org.mybatis.spring.boot:mybatis-spring-boot-starter:$mybatisSpringBootStarterVersion"
    compile "com.github.pagehelper:pagehelper-spring-boot-starter:$pageHelperVersion"
	compile "com.alibaba:druid-spring-boot-starter:$druidVersion"
	compile "commons-fileupload:commons-fileupload:$commonsFileuploadVersion"
	compile "aopalliance:aopalliance:$aopallianceVersion"
	compile "org.aspectj:aspectjweaver:$aspectjweaverVersion"
	compile "org.springframework.boot:spring-boot-starter-web:$springBootVersion"
	compile "org.springframework.boot:spring-boot-starter-jdbc:$springBootVersion"
	compile "org.springframework.boot:spring-boot-devtools:$springBootVersion"
	compile "org.springframework:spring-context-support:$springVersion"
	compile "org.springframework:spring-tx:$springVersion"
	compile "org.springframework:spring-orm:$springVersion"
	compile "org.springframework:spring-aspects:$springVersion"
	compile "org.springframework:spring-websocket:$springVersion"
	compile "org.springframework:spring-messaging:$springVersion"
	compile "com.alibaba:fastjson:$fastJsonVersion"
	compile "org.apache.commons:commons-lang3:$commonsLang3Version"
	compile "com.lmax:disruptor:$disruptorVersion"
	// https://mvnrepository.com/artifact/org.springframework.boot/spring-boot-starter-test
    testCompile "org.springframework.boot:spring-boot-starter-test:$springBootVersion"
	
	
	//added by bruce 
    //compile "org.springframework.boot:spring-boot-starter-data-ldap:$springBootVersion"    
	//compile group: 'org.springframework.ldap', name: 'spring-ldap-core', version: '2.3.2.RELEASE'
	// https://mvnrepository.com/artifact/redis.clients/jedis
	//compile group: 'redis.clients', name: 'jedis', version: '2.6.2'
	// https://mvnrepository.com/artifact/com.rabbitmq/amqp-client
	// https://mvnrepository.com/artifact/org.apache.storm/storm-kafka
	compile group: 'dom4j', name: 'dom4j', version: '1.6.1'
	compile group: 'log4j', name: 'log4j', version: '1.2.17'
    // https://mvnrepository.com/artifact/javax.mail/mail
	// https://mvnrepository.com/artifact/com.fasterxml.jackson.core/jackson-annotations
	compile group: 'mysql', name: 'mysql-connector-java', version: '5.1.34'
	compile "org.apache.httpcomponents:httpcore:4.3.2"
	compile group: 'commons-httpclient', name: 'commons-httpclient', version: '3.0.1'
	compile group: 'com.thoughtworks.xstream', name: 'xstream', version: '1.4.9'
	compile group: 'org.apache.httpcomponents', name: 'httpclient', version: '4.5.2'
	compile group: 'org.jdom', name: 'jdom', version: '2.0.2'
	compile group: 'org.springframework.boot', name: 'spring-boot-starter-tomcat'
	//引入 thymeleaf 模板依赖 
	compile group: 'org.springframework.boot', name: 'spring-boot-starter-thymeleaf'
	
}


